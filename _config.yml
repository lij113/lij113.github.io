# The Site Configuration
theme: jekyll-theme-chirpy
lang: en

title: 李杰雨
tagline: Agent Security &middot; Fudan University
description: >-
  Personal homepage of Jieyu Li &mdash; Ph.D. student at Fudan University MAS Lab, researching Agent Security.
url: "https://lij113.github.io"

github:
  username: lij113

social:
  name: Jieyu Li
  email: jieyu.li@vanderbilt.edu
  links:
    - https://github.com/lij113

theme_mode:

avatar: /assets/img/avatar.jpg

toc: true

pwa:
  enabled: false

paginate: 10

baseurl: ""

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - LICENSE
  - rollup.config.js
  - package*.json

jekyll-archives:
  enabled: []
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
