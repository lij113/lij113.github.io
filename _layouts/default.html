---
layout: compress
---

<!doctype html>
<html lang="{{ page.lang | default: site.lang }}">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f7f7">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1b1b1e">

    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">

    <link rel="stylesheet" href="{{ '/assets/css/:THEME.css' | replace: ':THEME', site.theme | relative_url }}">
    <link rel="stylesheet" href="{{ site.data.origin[type].webfonts | relative_url }}">

    <link rel="icon" type="image/png" href="{{ '/assets/img/favicons/favicon.png' | relative_url }}">

    <script src="{{ '/assets/js/dist/theme.min.js' | relative_url }}"></script>
  </head>

  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="/" class="site-brand">{{ site.title }}</a>
        <nav class="site-nav">
          <a href="/">EN</a>
          <a href="/zh/">中文</a>
        </nav>
      </div>
    </header>

    <main class="site-main">
      <div class="main-content">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <p>&copy; {% if page.year %}{{ page.year }}{% else %}2026{% endif %} {{ site.title }}. Built with Jekyll.</p>
    </footer>

    <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-alt: #f7f7f7;
      --text: #1a1a2e;
      --text-muted: #64748b;
      --accent: #0366d6;
      --accent-light: rgba(3,102,214,0.08);
      --border: rgba(0,0,0,0.06);
      --radius: 10px;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    [data-mode="dark"] {
      --bg: #1b1b1e;
      --bg-alt: #252529;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.06);
      --shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: rgba(3,102,214,0.18); }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ===== HEADER ===== */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    [data-mode="dark"] .site-header { background: rgba(27,27,30,0.9); }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-brand {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .site-nav {
      display: flex;
      gap: 0.15rem;
    }
    .site-nav a {
      padding: 0.35rem 0.75rem;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-muted);
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }
    .site-nav a:hover {
      color: var(--accent);
      background: var(--accent-light);
      text-decoration: none;
    }

    /* ===== MAIN ===== */
    .site-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ===== FOOTER ===== */
    .site-footer {
      text-align: center;
      padding: 2rem 1.5rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* ===== HOME PROFILE ===== */
    .home-profile {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    @media (max-width: 600px) {
      .home-profile { flex-direction: column; align-items: center; text-align: center; }
    }

    .home-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(3,102,214,0.2);
      flex-shrink: 0;
    }

    .home-info { flex: 1; }
    .home-name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.2rem;
    }
    .home-name-cn {
      font-weight: 400;
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-left: 0.4rem;
    }
    .home-title {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 0.2rem 0;
    }
    .home-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.8rem;
    }
    .hl-item {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.28rem 0.7rem;
      font-size: 0.82rem;
      font-weight: 500;
      border-radius: 20px;
      border: 1px solid rgba(3,102,214,0.2);
      color: var(--accent);
      background: var(--accent-light);
      text-decoration: none;
      transition: background 0.15s, transform 0.15s;
    }
    .hl-item:hover {
      background: rgba(3,102,214,0.14);
      transform: translateY(-1px);
      text-decoration: none;
    }

    /* ===== BIO ===== */
    .home-bio {
      font-size: 0.93rem;
      line-height: 1.8;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .home-bio p { margin: 0.5rem 0; }
    .home-bio strong { color: var(--text); }

    /* ===== SECTIONS ===== */
    .home-sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 600px) { .home-sections { grid-template-columns: 1fr; } }

    .hs-block {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.3rem;
    }

    .hs-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 0.8rem;
    }

    /* Education */
    .edu-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .edu-item { display: flex; gap: 0.8rem; font-size: 0.85rem; }
    .edu-period { color: var(--accent); font-weight: 600; font-size: 0.78rem; min-width: 68px; padding-top: 0.05rem; }
    .edu-content { color: var(--text-muted); line-height: 1.5; }

    /* Interests */
    .interests-grid { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .interest-tag {
      padding: 0.18rem 0.55rem;
      font-size: 0.75rem;
      border-radius: 14px;
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 500;
    }

    /* News */
    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.2rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--accent);
      display: inline-block;
    }

    .home-news, .home-pubs, .home-exp { margin-bottom: 2rem; }
    .news-timeline { display: flex; flex-direction: column; gap: 0.5rem; }
    .nt-item { display: flex; gap: 0.8rem; font-size: 0.88rem; color: var(--text-muted); }
    .nt-date { color: var(--accent); font-weight: 600; font-size: 0.78rem; min-width: 68px; }
    .nt-text strong { color: var(--text); }

    /* Publications */
    .pub-item {
      border-left: 3px solid var(--accent);
      padding: 0.8rem 1rem;
      background: var(--accent-light);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .pub-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.3rem; }
    .pub-authors { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.2rem; }
    .pub-authors strong { color: var(--text); }
    .pub-venue { font-size: 0.83rem; color: var(--text-muted); }

    /* Experience */
    .exp-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .exp-item { display: flex; gap: 0.8rem; }
    .exp-period { color: var(--accent); font-weight: 600; font-size: 0.78rem; min-width: 68px; padding-top: 0.05rem; }
    .exp-content { font-size: 0.88rem; color: var(--text-muted); }
    .exp-content strong { color: var(--text); }
    .exp-content p { margin: 0.2rem 0 0; line-height: 1.5; }

    /* ===== PROJECT CARDS ===== */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
    }
    .project-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      background: var(--bg-alt);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .project-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
      border-color: rgba(3,102,214,0.3);
    }
    .project-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.7rem;
      font-size: 1rem;
      color: #fff;
    }
    .project-card h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .project-card h3 a { color: var(--text); text-decoration: none; }
    .project-card h3 a:hover { color: var(--accent); text-decoration: underline; }
    .project-card .desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 0.7rem;
    }
    .project-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.5rem; }
    .tag {
      padding: 0.12rem 0.5rem;
      font-size: 0.72rem;
      border-radius: 12px;
      font-weight: 500;
      opacity: 0.85;
    }
    .project-card .links a {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
    }
    .project-card .links a:hover { color: var(--accent); }

    /* ===== PAGE HEADING ===== */
    .page-heading {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--accent);
      display: inline-block;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 600px) {
      .site-nav a { font-size: 0.82rem; padding: 0.3rem 0.5rem; }
    }
    </style>
  </body>
</html>
