<style>

  }

  /* Sidebar styling */
  #sidebar .sidebar-top {
    padding-bottom: 0.5rem;
  }

  #sidebar .site-title {

    letter-spacing: -0.02em;
  }

    opacity: 0.7;
  }

  #sidebar .avatar img {
    border: 3px solid rgba(3, 102, 214, 0.2);

  }

  #sidebar .avatar img:hover {
    border-color: rgba(3, 102, 214, 0.5);
  }

  #sidebar .contact-list a {
    transition: color 0.15s ease, transform 0.15s ease;

  #sidebar .contact-list a:hover {

    font-weight: 600;
  }
